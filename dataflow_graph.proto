syntax = "proto3"; 

message Kernel {
	string name = 1; 
	int32 id = 2;
	int32 outer = 3;
	int32 M = 4;
	int32 K = 5;
	int32 N = 6;
	KernelType type = 7;
	
	enum KernelType {
		SYSTOLIC = 0;
		SIMD = 1;
	}
}

message Buffer {
	string name = 1; 
	int32 id = 2;
	int32 tensor_size = 3;
	int32 startIdx = 4;
	int32 endIdx = 5;
	BufferType type = 6;
	
	enum BufferType {
		WEIGHT = 0;
		INTERMEDIATE = 1;
	}
}

message Dataflow_Graph {
	repeated Kernel kernels = 1;
	repeated Buffer buffers = 2;
}
